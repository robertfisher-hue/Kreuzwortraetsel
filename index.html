<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kreuzworträtsel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

:root {
–bg:       #0d0015;
–pink:     #e040fb;
–cyan:     #00e5ff;
–teal:     #00bfa5;
–lavender: #ce93d8;
–white:    #f0e6ff;
–cell:     40px;
}

- { box-sizing: border-box; margin: 0; padding: 0; }
  body {
  background: var(–bg);
  color: var(–white);
  font-family: ‘Space Grotesk’, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  }

/* ── BACKGROUND ── */
.bg {
position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-sky {
position: absolute; inset: 0;
background: linear-gradient(180deg, #0d0015 0%, #1a0030 35%, #2d0050 58%, #0d0015 100%);
}
.bg-sun {
position: absolute; left: 50%; top: 36%;
transform: translate(-50%, -50%);
width: 160px; height: 160px; border-radius: 50%;
background: linear-gradient(180deg, #ff6ec7 0%, #ffb347 60%, #ff6ec7 100%);
box-shadow: 0 0 60px 20px rgba(255,110,199,0.3);
overflow: hidden;
}
.bg-sun::after {
content: ‘’; position: absolute; inset: 0;
background: repeating-linear-gradient(180deg, transparent 0px, transparent 11px, var(–bg) 11px, var(–bg) 15px);
opacity: 0.6;
}
.bg-grid {
position: absolute; bottom: 0; left: 0; right: 0; height: 50vh;
background-image:
linear-gradient(rgba(0,229,255,0.2) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,229,255,0.2) 1px, transparent 1px);
background-size: 40px 40px;
transform: perspective(400px) rotateX(55deg);
transform-origin: bottom center;
mask-image: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
-webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
}
.bg-scan {
position: absolute; inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
}
.bg-hline {
position: absolute; left: 0; right: 0; height: 1px;
background: linear-gradient(90deg, transparent, var(–pink), transparent);
}
.bg-hline:nth-child(5) { top: 40%; opacity: 0.35; }
.bg-hline:nth-child(6) { top: 42%; opacity: 0.15; }
.bg-statue {
position: absolute; right: 3%; bottom: 26%;
width: min(200px, 26vw); opacity: 0.11;
filter: drop-shadow(0 0 16px rgba(224,64,251,0.5));
}

/* ── CONTENT ── */
.content { position: relative; z-index: 1; }

/* ── HEADER ── */
header { text-align: center; padding: 36px 20px 20px; }
.eyebrow {
font-family: ‘Space Mono’, monospace;
font-size: 9px; letter-spacing: 5px; color: var(–cyan);
text-transform: uppercase; margin-bottom: 10px; opacity: 0.75;
}
h1 {
font-size: clamp(2rem, 7vw, 3.2rem); font-weight: 700;
line-height: 1; letter-spacing: -1px;
background: linear-gradient(90deg, var(–cyan) 0%, var(–pink) 55%, var(–lavender) 100%);
-webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
filter: drop-shadow(0 0 18px rgba(224,64,251,0.35));
}
.tagline {
font-size: 11px; color: var(–lavender); margin-top: 8px;
letter-spacing: 2px; text-transform: uppercase; opacity: 0.6;
}

/* ── STATUS ── */
.status {
display: flex; justify-content: center;
margin: 0 auto 20px; max-width: 360px; width: calc(100% - 28px);
border: 1px solid rgba(224,64,251,0.3); border-radius: 4px;
overflow: hidden; backdrop-filter: blur(8px);
background: rgba(107,33,168,0.15);
}
.status-item {
flex: 1; text-align: center; padding: 10px 8px;
border-right: 1px solid rgba(224,64,251,0.2);
font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(–lavender);
}
.status-item:last-child { border-right: none; }
.status-item strong {
display: block; font-family: ‘Space Mono’, monospace;
font-size: 20px; font-weight: 700; color: var(–cyan);
letter-spacing: -1px; line-height: 1.2; margin-bottom: 2px;
text-shadow: 0 0 10px rgba(0,229,255,0.5);
}

/* ── MAIN ── */
.main { display: flex; flex-direction: column; align-items: center; padding: 0 14px 52px; gap: 16px; }

/* ── ACTIVE CLUE BAR ── */
#active-clue {
width: 100%; max-width: 580px; min-height: 46px;
background: rgba(107,33,168,0.2);
border: 1px solid rgba(0,229,255,0.3); border-left: 3px solid var(–cyan);
padding: 11px 16px; font-size: 13px; line-height: 1.5;
display: flex; align-items: center; gap: 12px;
border-radius: 0 4px 4px 0; backdrop-filter: blur(10px); color: var(–white);
opacity: 0; transition: opacity 0.15s;
}
#active-clue.visible { opacity: 1; }
.clue-tag {
font-family: ‘Space Mono’, monospace; font-size: 13px; font-weight: 700;
color: var(–cyan); white-space: nowrap; min-width: 28px;
text-shadow: 0 0 8px rgba(0,229,255,0.6);
}

/* ── SUCCESS ── */
#success-banner {
display: none; width: 100%; max-width: 580px;
background: linear-gradient(90deg, rgba(224,64,251,0.2), rgba(0,229,255,0.2));
border: 1px solid var(–pink); color: var(–white); text-align: center;
padding: 16px 24px; font-size: 15px; font-weight: 500; border-radius: 4px;
letter-spacing: 1px; animation: popIn 0.3s ease;
box-shadow: 0 0 30px rgba(224,64,251,0.25); backdrop-filter: blur(10px);
}
@keyframes popIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }

/* ── GRID ── */
.grid-scroll { overflow-x: auto; max-width: 100%; }
#grid-table {
border-collapse: collapse; border: 2px solid var(–pink);
box-shadow: 0 0 30px rgba(224,64,251,0.2), 0 0 60px rgba(0,229,255,0.08);
}
#grid-table td {
width: var(–cell); height: var(–cell); padding: 0;
border: 1px solid rgba(224,64,251,0.22);
}
#grid-table td.black { background: #0a0010; border-color: rgba(224,64,251,0.12); }

/* cell-wrap: NO background-image here — it was hiding the numbers */
.cell-wrap {
width: var(–cell); height: var(–cell); position: relative;
background: rgba(255,255,255,0.04);
}
/* Subtle tile lines via pseudo-element so they don’t interfere with children */
.cell-wrap::before {
content: ‘’; position: absolute; inset: 0; pointer-events: none; z-index: 0;
background-image:
linear-gradient(rgba(224,64,251,0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(224,64,251,0.06) 1px, transparent 1px);
background-size: 10px 10px;
}
.cell-num {
position: absolute; top: 2px; left: 2px;
font-size: 8px; line-height: 1;
font-family: ‘Space Mono’, monospace; font-weight: 700;
color: var(–cyan);
pointer-events: none;
/* z-index above the ::before tile lines */
z-index: 2;
text-shadow: 0 0 4px rgba(0,229,255,0.9);
}
.cell-input {
position: absolute; inset: 0; width: 100%; height: 100%;
border: none; background: transparent;
text-align: center;
font-family: ‘Space Mono’, monospace; font-size: 15px; font-weight: 700;
color: var(–white); text-transform: uppercase;
cursor: pointer; outline: none; caret-color: var(–cyan);
padding-top: 6px; z-index: 1;
-webkit-tap-highlight-color: transparent;
}
.cell-wrap.active      { background: rgba(0,229,255,0.1) !important; box-shadow: inset 0 0 8px rgba(0,229,255,0.15); }
.cell-wrap.highlighted { background: rgba(224,64,251,0.07) !important; }
.cell-wrap.correct .cell-input { color: var(–teal); text-shadow: 0 0 8px rgba(0,191,165,0.6); }
.cell-wrap.wrong   .cell-input { color: #ff4c8b; text-shadow: 0 0 8px rgba(255,76,139,0.4); }

/* ── CONTROLS ── */
.controls { display: flex; gap: 10px; justify-content: center; }
button {
font-family: ‘Space Grotesk’, sans-serif; font-size: 12px; font-weight: 500;
letter-spacing: 1.5px; text-transform: uppercase; padding: 10px 24px;
border: 1px solid rgba(0,229,255,0.4); background: rgba(0,229,255,0.05);
color: var(–cyan); cursor: pointer; border-radius: 3px;
transition: all 0.12s; backdrop-filter: blur(4px);
}
button:hover { background: rgba(0,229,255,0.15); border-color: var(–cyan); box-shadow: 0 0 14px rgba(0,229,255,0.2); }
button:active { transform: scale(0.97); }

/* ── DIVIDER ── */
.deco-line {
width: 100%; max-width: 580px; height: 1px;
background: linear-gradient(90deg, transparent, rgba(224,64,251,0.4), transparent);
}

/* ── CLUES — static, always visible ── */
.clues-container {
width: 100%; max-width: 580px;
display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.clue-section {
background: rgba(107,33,168,0.12); border: 1px solid rgba(224,64,251,0.2);
border-radius: 4px; padding: 14px 12px 12px; backdrop-filter: blur(8px);
}
.clue-section h2 {
font-family: ‘Space Mono’, monospace; font-size: 9px; font-weight: 700;
letter-spacing: 3px; text-transform: uppercase; color: var(–pink);
padding-bottom: 8px; margin-bottom: 8px;
border-bottom: 1px solid rgba(224,64,251,0.2);
text-shadow: 0 0 8px rgba(224,64,251,0.4);
}
.clue-item {
display: flex; gap: 8px; padding: 5px 4px; border-radius: 3px;
cursor: pointer; font-size: 11.5px; line-height: 1.5;
color: rgba(240,230,255,0.65); transition: background 0.1s, color 0.1s;
}
.clue-item:hover { background: rgba(0,229,255,0.06); color: var(–white); }
.clue-item.active { background: rgba(0,229,255,0.1); color: var(–white); }
.clue-item.done { opacity: 0.28; text-decoration: line-through; }
.clue-num {
font-family: ‘Space Mono’, monospace; font-size: 10px; font-weight: 700;
color: var(–cyan); min-width: 16px; padding-top: 1px; flex-shrink: 0;
text-shadow: 0 0 6px rgba(0,229,255,0.5);
}

@media (max-width: 500px) {
:root { –cell: 32px; }
.clues-container { grid-template-columns: 1fr; }
.clue-item { font-size: 11px; }
}
</style>

// ── PUZZLE DATA ────────────────────────────────────────────────────────────
const GRID_SOL = [

  [null,null,null,null,null,"K",null,null,null,null,null,null,null,null],
];

// Only real words with clues — defined explicitly, no auto-detection of fragments
const ACROSS_CLUES = {
  10: "Deutsche Kleinstadt mit drei DAX-notierten Weltkonzernen",
};
const DOWN_CLUES = {
  1:  "Franz, Richard und Moritz und Sandro",
  2:  "Wurde dem metaphorischen Heidemörder zum Opfer",
  3:  "Patentierte eine Wurstmasse aus Soja und band die BRD an den Westen",
  4:  "Hier fanden Basti, Thomas und Toni ihr größtes Glück",
  6:  "Dieser Christian war mit Michael und Rick im Weltall und dem wilden Westen",

  11: "Diesen Namen trugen schon Trompeter, Astronauten und Betrüger",
  12: "Verlor seinen Rilke in Malibu, nicht Colorado",
};

// Word start positions — computed once from solution grid, used for numbering cells
// Format: "row,col" -> clue number  (only cells that start a real clued word)
const CLUED_STARTS = {
  "0,1":1,  // WAGNER down
  "1,4":2,  // SIMONIS down
  "1,7":3,  // ADENAUER down
  "2,10":4, // MARACANA down
  "3,2":6,  // TRAMITZ down
  "3,11":8, // GATSBY down
  "3,12":9, // SCOVILLE down
  "4,0":10, // HERZOGENAURACH across
  "4,5":11, // GOTTSCHALK down
  "4,8":12, // ARMSTRONG down
};

// The actual word cell lists — explicit, no ambiguity
const WORD_MAP = {
  "10-across": { num:10, dir:"across", answer:"HERZOGENAURACH", cells: buildCells(4, 0, "across", 14) },
  "1-down":    { num:1,  dir:"down",   answer:"WAGNER",         cells: buildCells(0, 1, "down",   6)  },
  "2-down":    { num:2,  dir:"down",   answer:"SIMONIS",        cells: buildCells(1, 4, "down",   7)  },
  "3-down":    { num:3,  dir:"down",   answer:"ADENAUER",       cells: buildCells(1, 7, "down",   8)  },
  "4-down":    { num:4,  dir:"down",   answer:"MARACANA",       cells: buildCells(2,10, "down",   8)  },
  "6-down":    { num:6,  dir:"down",   answer:"TRAMITZ",        cells: buildCells(3, 2, "down",   7)  },
  "8-down":    { num:8,  dir:"down",   answer:"GATSBY",         cells: buildCells(3,11, "down",   6)  },
  "9-down":    { num:9,  dir:"down",   answer:"SCOVILLE",       cells: buildCells(3,12, "down",   8)  },
  "11-down":   { num:11, dir:"down",   answer:"GOTTSCHALK",     cells: buildCells(4, 5, "down",  10)  },
  "12-down":   { num:12, dir:"down",   answer:"ARMSTRONG",      cells: buildCells(4, 8, "down",   9)  },
};

function buildCells(r, c, dir, len) {
  const cells = [];
  for (let i = 0; i < len; i++) {
    cells.push(dir === "across" ? {r, c: c+i} : {r: r+i, c});
  }
  return cells;
}

// Verify grid integrity at startup
(function verifyGrid() {
  for (const [key, word] of Object.entries(WORD_MAP)) {
    for (let i = 0; i < word.cells.length; i++) {
      const {r, c} = word.cells[i];
      if (GRID_SOL[r][c] !== word.answer[i]) {
        console.error(`Grid mismatch:  pos  cell(,) = , expected `);
      }
    }
  }
})();

// ── STATE ──────────────────────────────────────────────────────────────────
const ROWS = GRID_SOL.length;
const COLS = GRID_SOL[0].length;
const userGrid = Array.from({length: ROWS}, () => Array(COLS).fill(''));
let activeCell = null;
let activeDir  = 'across';
let activeWord = null;

// ── HELPERS ────────────────────────────────────────────────────────────────
const getWrap  = (r, c) => document.getElementById(`c_`);
const getInput = (r, c) => getWrap(r, c)?.querySelector('input');

function wordForCell(r, c, dir) {
  for (const w of Object.values(WORD_MAP)) {
    if (w.dir === dir && w.cells.some(x => x.r === r && x.c === c)) return w;
  }
  return null;
}

// ── BUILD GRID DOM ─────────────────────────────────────────────────────────
function buildGrid() {
  const tbody = document.getElementById('grid-body');
  for (let r = 0; r < ROWS; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < COLS; c++) {
      const td = document.createElement('td');
      if (GRID_SOL[r][c] === null) {
        td.className = 'black';
      } else {
        const wrap = document.createElement('div');
        wrap.className = 'cell-wrap';
        wrap.id = `c_`;

        // Number label — only for clued word starts
        const num = CLUED_STARTS[`,`];
        if (num !== undefined) {
          const span = document.createElement('span');
          span.className = 'cell-num';
          span.textContent = num;
          wrap.appendChild(span);
        }

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.className = 'cell-input';
        inp.maxLength = 1;
        inp.setAttribute('autocomplete', 'off');
        inp.setAttribute('autocorrect', 'off');
        inp.setAttribute('autocapitalize', 'characters');
        inp.setAttribute('spellcheck', 'false');
        inp.setAttribute('inputmode', 'text');
        inp.addEventListener('click',   () => onCellClick(r, c));
        inp.addEventListener('focus',   () => onCellFocus(r, c));
        inp.addEventListener('input',   e  => onInput(e, r, c));
        inp.addEventListener('keydown', e  => onKeyDown(e, r, c));
        wrap.appendChild(inp);
        td.appendChild(wrap);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
}

// ── BUILD CLUE LISTS ───────────────────────────────────────────────────────
function buildClues() {
  const aList = document.getElementById('across-list');
  const dList = document.getElementById('down-list');

  // Sort numerically
  for (const num of Object.keys(ACROSS_CLUES).map(Number).sort((a,b)=>a-b)) {
    aList.appendChild(makeClueEl(num, ACROSS_CLUES[num], 'across'));
  }
  for (const num of Object.keys(DOWN_CLUES).map(Number).sort((a,b)=>a-b)) {
    dList.appendChild(makeClueEl(num, DOWN_CLUES[num], 'down'));
  }

  document.getElementById('total-count').textContent = Object.keys(WORD_MAP).length;
}

function makeClueEl(num, clue, dir) {
  const div = document.createElement('div');
  div.className = 'clue-item';
  div.id = `clue--`;
  div.innerHTML = `<span class="clue-num"></span><span></span>`;
  div.addEventListener('click', () => activateWord(num, dir));
  return div;
}

// ── ACTIVATION ────────────────────────────────────────────────────────────
function setActive(r, c, preferDir) {
  activeCell = {r, c};
  let word = wordForCell(r, c, preferDir);
  if (!word) {
    const other = preferDir === 'across' ? 'down' : 'across';
    word = wordForCell(r, c, other);
    if (word) preferDir = other;
  }
  activeDir  = preferDir;
  activeWord = word;
  renderHighlights();
  renderClueBar();
}

function onCellClick(r, c) {
  if (activeCell && activeCell.r === r && activeCell.c === c) {
    // Same cell: toggle direction if word exists in other direction
    const other = activeDir === 'across' ? 'down' : 'across';
    const w = wordForCell(r, c, other);
    if (w) { activeDir = other; activeWord = w; renderHighlights(); renderClueBar(); }
  } else {
    setActive(r, c, activeDir);
  }
}

function onCellFocus(r, c) {
  if (!activeCell || activeCell.r !== r || activeCell.c !== c) {
    setActive(r, c, activeDir);
  }
}

function activateWord(num, dir) {
  const word = WORD_MAP[`-`];
  if (!word) return;
  activeWord = word;
  activeDir  = dir;
  // Jump to first empty cell, or first cell
  const target = word.cells.find(({r, c}) => !userGrid[r][c]) || word.cells[0];
  activeCell = {r: target.r, c: target.c};
  renderHighlights();
  renderClueBar();
  getInput(target.r, target.c)?.focus();
}

// ── HIGHLIGHTS + CLUE BAR ─────────────────────────────────────────────────
function renderHighlights() {
  document.querySelectorAll('.cell-wrap').forEach(w => w.classList.remove('active', 'highlighted'));
  if (!activeWord) return;
  for (const {r, c} of activeWord.cells) {
    const wrap = getWrap(r, c);
    if (!wrap) continue;
    const isCursor = activeCell && r === activeCell.r && c === activeCell.c;
    wrap.classList.add(isCursor ? 'active' : 'highlighted');
  }
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  const ce = document.getElementById(`clue--`);
  if (ce) { ce.classList.add('active'); ce.scrollIntoView({block: 'nearest', behavior: 'smooth'}); }
}

function renderClueBar() {
  const bar = document.getElementById('active-clue');
  if (!activeWord) { bar.classList.remove('visible'); return; }
  const clues = activeWord.dir === 'across' ? ACROSS_CLUES : DOWN_CLUES;
  const clue  = clues[activeWord.num];
  if (!clue) { bar.classList.remove('visible'); return; }
  document.getElementById('active-tag').textContent  = ` '↓' `;
  document.getElementById('active-text').textContent = clue;
  bar.classList.add('visible');
}

// ── INPUT ─────────────────────────────────────────────────────────────────
function onInput(e, r, c) {
  let val = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
  if (val.length > 1) val = val.slice(-1);
  e.target.value   = val;
  userGrid[r][c]   = val;
  clearMark(r, c);
  if (val) advance(r, c);
  updateWordDone();
}

function onKeyDown(e, r, c) {
  switch (e.key) {
    case 'Backspace':
      e.preventDefault();
      if (userGrid[r][c]) {
        userGrid[r][c] = '';
        getInput(r, c).value = '';
        clearMark(r, c);
      } else {
        retreat(r, c);
      }
      break;
    case 'ArrowRight': e.preventDefault(); move(r, c,  0,  1, 'across'); break;
    case 'ArrowLeft':  e.preventDefault(); move(r, c,  0, -1, 'across'); break;
    case 'ArrowDown':  e.preventDefault(); move(r, c,  1,  0, 'down');   break;
    case 'ArrowUp':    e.preventDefault(); move(r, c, -1,  0, 'down');   break;
    case 'Tab':        e.preventDefault(); jumpWord(e.shiftKey); break;
  }
}

function advance(r, c) {
  if (!activeWord) return;
  const idx = activeWord.cells.findIndex(x => x.r === r && x.c === c);
  if (idx < activeWord.cells.length - 1) {
    const n = activeWord.cells[idx + 1];
    activeCell = n;
    renderHighlights();
    getInput(n.r, n.c)?.focus();
  }
}

function retreat(r, c) {
  if (!activeWord) return;
  const idx = activeWord.cells.findIndex(x => x.r === r && x.c === c);
  if (idx > 0) {
    const p = activeWord.cells[idx - 1];
    activeCell = p;
    renderHighlights();
    const inp = getInput(p.r, p.c);
    if (inp) {
      inp.focus();
      userGrid[p.r][p.c] = '';
      inp.value = '';
      clearMark(p.r, p.c);
    }
  }
}

function move(r, c, dr, dc, dir) {
  const nr = r + dr, nc = c + dc;
  if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && GRID_SOL[nr][nc] !== null) {
    setActive(nr, nc, dir);
    getInput(nr, nc)?.focus();
  }
}

function jumpWord(reverse) {
  const keys = Object.keys(WORD_MAP);
  const cur  = activeWord ? `-` : '';
  let idx    = keys.indexOf(cur);
  idx = reverse ? (idx - 1 + keys.length) % keys.length : (idx + 1) % keys.length;
  const w = WORD_MAP[keys[idx]];
  activateWord(w.num, w.dir);
}

// ── CHECK + RESET ─────────────────────────────────────────────────────────
function clearMark(r, c) {
  getWrap(r, c)?.classList.remove('correct', 'wrong');
}

function checkAll() {
  let allCorrect = true;
  for (const word of Object.values(WORD_MAP)) {
    for (let i = 0; i < word.cells.length; i++) {
      const {r, c} = word.cells[i];
      const wrap = getWrap(r, c);
      if (!wrap) continue;
      wrap.classList.remove('correct', 'wrong');
      const val = userGrid[r][c];
      if (!val) { allCorrect = false; continue; }
      if (val === word.answer[i]) wrap.classList.add('correct');
      else { wrap.classList.add('wrong'); allCorrect = false; }
    }
  }
  if (allCorrect) showSuccess();
}

function resetAll() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (GRID_SOL[r][c] === null) continue;
      userGrid[r][c] = '';
      const inp = getInput(r, c);
      if (inp) inp.value = '';
      getWrap(r, c)?.classList.remove('correct', 'wrong');
    }
  }
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('done'));
  document.getElementById('success-banner').style.display = 'none';
  updateProgress();
}

function updateWordDone() {
  for (const word of Object.values(WORD_MAP)) {
    const done = word.cells.every(({r, c}, i) => userGrid[r][c] === word.answer[i]);
    document.getElementById(`clue--`)?.classList.toggle('done', done);
  }
  updateProgress();
}

function updateProgress() {
  const total   = Object.keys(WORD_MAP).length;
  const correct = Object.values(WORD_MAP).filter(w =>
    w.cells.every(({r, c}, i) => userGrid[r][c] === w.answer[i])
  ).length;
  document.getElementById('solved-count').textContent = correct;
  document.getElementById('pct').textContent = Math.round(correct / total * 100) + '%';
}

function showSuccess() {
  const b = document.getElementById('success-banner');
  b.style.display = 'block';
  b.scrollIntoView({behavior: 'smooth', block: 'center'});
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildGrid();
buildClues();
updateProgress();
// Start with HERZOGENAURACH selected
activateWord(10, 'across');
</script>
